<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estacionamiento Inteligente</title>

<style>
/* ===== ESTILO GENERAL ===== */
body {
    font-family: Arial;
    text-align: center;
    background: #eef2f3;
}

/* ===== ESCENARIO (zona visual) ===== */
#escenario {
    width: 500px;
    height: 200px;
    margin: 20px auto;
    position: relative;
    background: #ccc;
    border-radius: 10px;
    overflow: hidden;
}

/* Calle (fondo) */
#calle {
    width: 100%;
    height: 80px;
    background: #444;
    position: absolute;
    bottom: 0;
    z-index: 1;
}

/* Línea de carril */
#linea {
    width: 100%;
    height: 5px;
    background: repeating-linear-gradient(
        to right,
        white 0px,
        white 20px,
        transparent 20px,
        transparent 40px
    );
    position: absolute;
    bottom: 40px;
    z-index: 2;
}

/* ===== AUTO (simulación visual) ===== */
#auto {
    width: 50px;
    height: 30px;
    background: blue;
    position: absolute;
    bottom: 25px;
    left: 0px;
    border-radius: 5px;
    transition: left 2s;
    z-index: 3;
}

/* Ruedas */
#auto::before,
#auto::after {
    content: "";
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    position: absolute;
    bottom: -5px;
}

#auto::before { left: 5px; }
#auto::after { right: 5px; }

/* ===== PLUMA (barrera) ===== */
#pluma {
    width: 120px;
    height: 10px;
    background: red;
    position: absolute;
    bottom: 60px;
    left: 200px;
    transform-origin: left center;
    transition: transform 1s;
    z-index: 4;
}

/* Base de la pluma */
#base {
    width: 20px;
    height: 40px;
    background: black;
    position: absolute;
    bottom: 60px;
    left: 200px;
    z-index: 4;
}

/* Estado visual: abierta */
.abierta {
    transform: rotate(-70deg);
    background: green;
}

/* ===== SEMÁFORO ===== */
#semaforo {
    width: 30px;
    height: 70px;
    background: #222;
    border-radius: 10px;
    position: absolute;
    bottom: 70px;
    left: 170px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    padding: 5px;
    z-index: 5;
}

.luz {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: #555;
}

.rojo { background: red; }
.verde { background: green; }

/* ===== LOG ===== */
#log {
    width: 80%;
    height: 150px;
    background: black;
    color: #00ff00;
    margin: auto;
    overflow-y: auto;
    padding: 10px;
    text-align: left;
}

button {
    padding: 10px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>🚗 Estacionamiento Inteligente</h1>

<h2 id="estado">Estado: Cerrada</h2>
<h3 id="espacios">Espacios disponibles: 10</h3>

<div id="escenario">

    <!-- Semáforo -->
    <div id="semaforo">
        <div id="luzRoja" class="luz rojo"></div>
        <div id="luzVerde" class="luz"></div>
    </div>

    <!-- Pluma -->
    <div id="base"></div>
    <div id="pluma"></div>

    <!-- Auto -->
    <div id="auto"></div>

    <!-- Calle -->
    <div id="calle"></div>
    <div id="linea"></div>

</div>

<button onclick="entradaAuto()">🚗 Entrada</button>
<button onclick="salidaAuto()">🚙 Salida</button>

<h3>📊 Registro del sistema</h3>
<div id="log"></div>

<script>

// ================= VARIABLES =================
// Representa espacios disponibles del estacionamiento
let espacios = 10;

// ================= UTILIDAD =================
// Muestra eventos en pantalla (simulación de consola)
function log(msg) {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += msg + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

// ================= CONTEXTO =================
// 🔥 CLASE PRINCIPAL DEL PATRÓN STATE
// Mantiene el estado actual y delega el comportamiento
class Pluma {
    constructor() {
        this.estado = new Cerrada(); // Estado inicial
        actualizarEstado(this.estado.nombre);
    }

    // 🔄 TRANSICIÓN DE ESTADO
    setEstado(nuevoEstado) {
        this.estado = nuevoEstado;
        actualizarEstado(this.estado.nombre);
        log("➡️ Estado: " + this.estado.nombre);
    }

    // 🔥 MÉTODO CLAVE DEL PATRÓN STATE
    // Todas las acciones pasan por aquí
    request(accion) {
        this.estado.handle(this, accion);
    }
}

// ================= ESTADOS =================

// 🔴 ESTADO: CERRADA
class Cerrada {
    constructor() { this.nombre = "Cerrada"; }

    handle(pluma, accion) {

        // Evento ABRIR
        if (accion === "ABRIR") {

            // Validación del sistema
            if (espacios <= 0) {
                log("❌ Estacionamiento lleno");
                return;
            }

            // Cambio a estado intermedio
            pluma.setEstado(new Abriendose());
            log("🔄 Abriendo pluma...");

            setTimeout(() => {

                // Cambios visuales
                document.getElementById("pluma").classList.add("abierta");

                // Semáforo verde
                document.getElementById("luzRoja").classList.remove("rojo");
                document.getElementById("luzVerde").classList.add("verde");

                // Movimiento del auto
                document.getElementById("auto").style.left = "180px";

                // Cambio a estado Abierta
                pluma.setEstado(new Abierta());

                espacios--;
                actualizarEspacios();

                log("✅ Auto entró");

                // Cierre automático
                setTimeout(() => pluma.request("CERRAR"), 3000);

            }, 1000);
        }

        else if (accion === "CERRAR") {
            log("⚠️ Ya está cerrada");
        }
    }
}

// 🟡 ESTADO: ABRIÉNDOSE
class Abriendose {
    constructor() { this.nombre = "Abriéndose"; }

    handle() {
        // Estado intermedio → no permite acciones
        log("⚠️ En proceso de apertura...");
    }
}

// 🟢 ESTADO: ABIERTA
class Abierta {
    constructor() { this.nombre = "Abierta"; }

    handle(pluma, accion) {

        if (accion === "CERRAR") {

            // Cambio a estado intermedio
            pluma.setEstado(new Cerrandose());
            log("🔄 Cerrando pluma...");

            setTimeout(() => {

                // Cambios visuales
                document.getElementById("pluma").classList.remove("abierta");

                // Semáforo rojo
                document.getElementById("luzRoja").classList.add("rojo");
                document.getElementById("luzVerde").classList.remove("verde");

                // Movimiento del auto (sale)
                document.getElementById("auto").style.left = "480px";

                // Reset del auto
                setTimeout(() => {
                    document.getElementById("auto").style.left = "0px";
                }, 2000);

                // Cambio a estado Cerrada
                pluma.setEstado(new Cerrada());
                log("🔒 Pluma cerrada");

            }, 1000);
        }

        else if (accion === "ABRIR") {
            log("⚠️ Ya está abierta");
        }
    }
}

// 🟠 ESTADO: CERRÁNDOSE
class Cerrandose {
    constructor() { this.nombre = "Cerrándose"; }

    handle() {
        // Estado intermedio → no permite acciones
        log("⚠️ En proceso de cierre...");
    }
}

// ================= FUNCIONES =================

// Actualiza el estado en pantalla
function actualizarEstado(nombre) {
    document.getElementById("estado").innerText = "Estado: " + nombre;
}

// Actualiza espacios disponibles
function actualizarEspacios() {
    document.getElementById("espacios").innerText = "Espacios disponibles: " + espacios;
}

// Evento: llega un auto
function entradaAuto() {
    log("🚗 Auto detectado");
    pluma.request("ABRIR"); // 🔥 Uso del patrón State
}

// Evento: sale un auto
function salidaAuto() {
    espacios++;
    actualizarEspacios();
    log("🚙 Auto salió");
}

// ================= INICIO =================
const pluma = new Pluma(); // Se inicializa el sistema

</script>

</body>
</html>
