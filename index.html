<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Estacionamiento Inteligente</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #eef2f3;
}

/* ===== ESCENARIO ===== */
#escenario {
    width: 500px;
    height: 200px;
    margin: 20px auto;
    position: relative;
    background: #ccc;
    border-radius: 10px;
    overflow: hidden;
}

/* Calle */
#calle {
    width: 100%;
    height: 80px;
    background: #444;
    position: absolute;
    bottom: 0;
    z-index: 1;
}

/* Línea */
#linea {
    width: 100%;
    height: 5px;
    background: repeating-linear-gradient(
        to right,
        white 0px,
        white 20px,
        transparent 20px,
        transparent 40px
    );
    position: absolute;
    bottom: 40px;
    z-index: 2;
}

/* ===== AUTO ===== */
#auto {
    width: 50px;
    height: 30px;
    background: blue;
    position: absolute;
    bottom: 25px;
    left: 0px;
    border-radius: 5px;
    transition: left 2s;
    z-index: 3;
}

#auto::before,
#auto::after {
    content: "";
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
    position: absolute;
    bottom: -5px;
}

#auto::before { left: 5px; }
#auto::after { right: 5px; }

/* ===== PLUMA ===== */
#pluma {
    width: 120px;
    height: 10px;
    background: red;
    position: absolute;
    bottom: 60px;
    left: 200px;
    transform-origin: left center;
    transition: transform 1s;
    z-index: 4;
}

#base {
    width: 20px;
    height: 40px;
    background: black;
    position: absolute;
    bottom: 60px;
    left: 200px;
    z-index: 4;
}

.abierta {
    transform: rotate(-70deg);
    background: green;
}

/* ===== SEMÁFORO ===== */
#semaforo {
    width: 30px;
    height: 70px;
    background: #222;
    border-radius: 10px;
    position: absolute;
    bottom: 70px;
    left: 170px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    padding: 5px;
    z-index: 5;
}

.luz {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: #555;
}

.rojo { background: red; }
.verde { background: green; }

/* ===== LOG ===== */
#log {
    width: 80%;
    height: 150px;
    background: black;
    color: #00ff00;
    margin: auto;
    overflow-y: auto;
    padding: 10px;
    text-align: left;
}

button {
    padding: 10px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>🚗 Estacionamiento Inteligente</h1>

<h2 id="estado">Estado: Cerrada</h2>
<h3 id="espacios">Espacios disponibles: 10</h3>

<div id="escenario">

    <div id="semaforo">
        <div id="luzRoja" class="luz rojo"></div>
        <div id="luzVerde" class="luz"></div>
    </div>

    <div id="base"></div>
    <div id="pluma"></div>

    <div id="auto"></div>

    <div id="calle"></div>
    <div id="linea"></div>

</div>

<button onclick="entradaAuto()">🚗 Entrada</button>
<button onclick="salidaAuto()">🚙 Salida</button>

<h3>📊 Registro del sistema</h3>
<div id="log"></div>

<script>

// ===== VARIABLES =====
let espacios = 10;

// ===== LOG =====
function log(msg) {
    const logDiv = document.getElementById("log");
    logDiv.innerHTML += msg + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

// ===== CONTEXTO =====
class Pluma {
    constructor() {
        this.estado = new Cerrada();
        actualizarEstado(this.estado.nombre);
    }

    setEstado(nuevoEstado) {
        this.estado = nuevoEstado;
        actualizarEstado(this.estado.nombre);
        log("➡️ Estado: " + this.estado.nombre);
    }

    request(accion) {
        this.estado.handle(this, accion);
    }
}

// ===== ESTADOS =====

class Cerrada {
    constructor() { this.nombre = "Cerrada"; }

    handle(pluma, accion) {

        if (accion === "ABRIR") {

            if (espacios <= 0) {
                log("❌ Estacionamiento lleno");
                return;
            }

            pluma.setEstado(new Abriendose());
            log("🔄 Abriendo pluma...");

            setTimeout(() => {

                document.getElementById("pluma").classList.add("abierta");

                // semáforo verde
                document.getElementById("luzRoja").classList.remove("rojo");
                document.getElementById("luzVerde").classList.add("verde");

                // mover auto
                document.getElementById("auto").style.left = "180px";

                pluma.setEstado(new Abierta());

                espacios--;
                actualizarEspacios();

                log("✅ Auto entró");

                setTimeout(() => pluma.request("CERRAR"), 3000);

            }, 1000);
        }

        else if (accion === "CERRAR") {
            log("⚠️ Ya está cerrada");
        }
    }
}

class Abriendose {
    constructor() { this.nombre = "Abriéndose"; }

    handle() {
        log("⚠️ En proceso de apertura...");
    }
}

class Abierta {
    constructor() { this.nombre = "Abierta"; }

    handle(pluma, accion) {

        if (accion === "CERRAR") {

            pluma.setEstado(new Cerrandose());
            log("🔄 Cerrando pluma...");

            setTimeout(() => {

                document.getElementById("pluma").classList.remove("abierta");

                // semáforo rojo
                document.getElementById("luzRoja").classList.add("rojo");
                document.getElementById("luzVerde").classList.remove("verde");

                // sacar auto
                document.getElementById("auto").style.left = "480px";

                setTimeout(() => {
                    document.getElementById("auto").style.left = "0px";
                }, 2000);

                pluma.setEstado(new Cerrada());
                log("🔒 Pluma cerrada");

            }, 1000);
        }

        else if (accion === "ABRIR") {
            log("⚠️ Ya está abierta");
        }
    }
}

class Cerrandose {
    constructor() { this.nombre = "Cerrándose"; }

    handle() {
        log("⚠️ En proceso de cierre...");
    }
}

// ===== FUNCIONES =====

function actualizarEstado(nombre) {
    document.getElementById("estado").innerText = "Estado: " + nombre;
}

function actualizarEspacios() {
    document.getElementById("espacios").innerText = "Espacios disponibles: " + espacios;
}

function entradaAuto() {
    log("🚗 Auto detectado");
    pluma.request("ABRIR");
}

function salidaAuto() {
    espacios++;
    actualizarEspacios();
    log("🚙 Auto salió");
}

// ===== INICIO =====
const pluma = new Pluma();

</script>

</body>
</html>
